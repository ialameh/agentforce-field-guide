<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 600" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow-fc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <filter id="soft-shadow-fc" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="920" height="600" fill="#ffffff"/>

  <text x="460" y="34" font-size="22" font-weight="700" text-anchor="middle" fill="#0f172a">Four Runtime Contexts</text>
  <text x="460" y="56" font-size="13" text-anchor="middle" fill="#64748b">Where an Agentforce agent can be invoked, and which definition each context resolves against.</text>

  <!-- Authoring (draft) state -->
  <g filter="url(#soft-shadow-fc)">
    <rect x="40" y="100" width="380" height="170" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  </g>
  <text x="230" y="130" font-size="16" font-weight="700" text-anchor="middle" fill="#78350f">Authoring state (draft)</text>
  <text x="230" y="150" font-size="11" text-anchor="middle" fill="#92400e">What the Builder shows. Editable. Saved on Save.</text>

  <g filter="url(#soft-shadow-fc)">
    <rect x="60" y="170" width="160" height="80" rx="8" fill="#ffffff" stroke="#d97706" stroke-width="1.5"/>
  </g>
  <text x="140" y="195" font-size="13" font-weight="700" text-anchor="middle" fill="#78350f">1. Builder simulation</text>
  <text x="140" y="215" font-size="10" text-anchor="middle" fill="#92400e">"Try Agent" panel</text>
  <text x="140" y="231" font-size="10" text-anchor="middle" fill="#92400e">Iterative design feedback</text>
  <text x="140" y="247" font-size="9" font-style="italic" text-anchor="middle" fill="#a16207">Generous: may pass even if</text>

  <g filter="url(#soft-shadow-fc)">
    <rect x="240" y="170" width="160" height="80" rx="8" fill="#ffffff" stroke="#d97706" stroke-width="1.5" stroke-dasharray="4 3"/>
  </g>
  <text x="320" y="195" font-size="11" font-weight="600" text-anchor="middle" fill="#92400e">(authoring is also</text>
  <text x="320" y="211" font-size="11" font-weight="600" text-anchor="middle" fill="#92400e">where edits live</text>
  <text x="320" y="227" font-size="11" font-weight="600" text-anchor="middle" fill="#92400e">until activated)</text>

  <!-- Activate transition -->
  <g>
    <line x1="420" y1="185" x2="500" y2="185" stroke="#0f172a" stroke-width="3" marker-end="url(#arrow-fc)"/>
    <rect x="420" y="195" width="80" height="22" rx="4" fill="#0f172a"/>
    <text x="460" y="211" font-size="11" font-weight="700" text-anchor="middle" fill="#fff">Activate</text>
  </g>

  <!-- Runtime version -->
  <g filter="url(#soft-shadow-fc)">
    <rect x="500" y="100" width="380" height="370" rx="10" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
  </g>
  <text x="690" y="130" font-size="16" font-weight="700" text-anchor="middle" fill="#14532d">Runtime version (activated)</text>
  <text x="690" y="150" font-size="11" text-anchor="middle" fill="#166534">Snapshot the runtime engine actually serves. Updated only on Activate.</text>

  <g filter="url(#soft-shadow-fc)">
    <rect x="520" y="170" width="160" height="80" rx="8" fill="#ffffff" stroke="#15803d" stroke-width="1.5"/>
  </g>
  <text x="600" y="195" font-size="13" font-weight="700" text-anchor="middle" fill="#14532d">2. Test mode</text>
  <text x="600" y="215" font-size="10" text-anchor="middle" fill="#166534">Salesforce UI Test surface</text>
  <text x="600" y="231" font-size="10" text-anchor="middle" fill="#166534">Validate committed changes</text>
  <text x="600" y="247" font-size="9" font-style="italic" text-anchor="middle" fill="#15803d">Strict: trust this, not sim</text>

  <g filter="url(#soft-shadow-fc)">
    <rect x="700" y="170" width="160" height="80" rx="8" fill="#ffffff" stroke="#15803d" stroke-width="1.5"/>
  </g>
  <text x="780" y="195" font-size="13" font-weight="700" text-anchor="middle" fill="#14532d">3. Production conversation</text>
  <text x="780" y="215" font-size="10" text-anchor="middle" fill="#166534">Embedded chat / Slack /</text>
  <text x="780" y="231" font-size="10" text-anchor="middle" fill="#166534">mobile / voice / channels</text>
  <text x="780" y="247" font-size="9" font-style="italic" text-anchor="middle" fill="#15803d">Real users</text>

  <g filter="url(#soft-shadow-fc)">
    <rect x="610" y="270" width="160" height="80" rx="8" fill="#ffffff" stroke="#15803d" stroke-width="1.5"/>
  </g>
  <text x="690" y="295" font-size="13" font-weight="700" text-anchor="middle" fill="#14532d">4. Direct REST</text>
  <text x="690" y="315" font-size="10" text-anchor="middle" fill="#166534">/services/data/.../einstein/</text>
  <text x="690" y="331" font-size="10" text-anchor="middle" fill="#166534">agent/...</text>
  <text x="690" y="347" font-size="9" font-style="italic" text-anchor="middle" fill="#15803d">Backend smoke tests</text>

  <text x="690" y="385" font-size="12" font-weight="600" text-anchor="middle" fill="#14532d">Contexts 2, 3, and 4 all read the same</text>
  <text x="690" y="405" font-size="12" font-weight="600" text-anchor="middle" fill="#14532d">activated runtime registry.</text>
  <text x="690" y="430" font-size="11" font-style="italic" text-anchor="middle" fill="#166534">If sim works but test fails, activation is</text>
  <text x="690" y="448" font-size="11" font-style="italic" text-anchor="middle" fill="#166534">the most likely missing step.</text>

  <!-- Bottom mantra -->
  <g filter="url(#soft-shadow-fc)">
    <rect x="80" y="510" width="760" height="60" rx="8" fill="#0f172a" stroke="#0f172a" stroke-width="2"/>
  </g>
  <text x="460" y="535" font-size="14" font-weight="700" text-anchor="middle" fill="#fff">Activate after every change.</text>
  <text x="460" y="557" font-size="13" text-anchor="middle" fill="#cbd5e1">Trust the test, not the simulation.</text>
</svg>
