<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arr-qs" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <filter id="ds-qs" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="1000" height="480" fill="#ffffff"/>

  <text x="500" y="34" font-size="22" font-weight="700" text-anchor="middle" fill="#0f172a">What You Build in the Quickstart</text>
  <text x="500" y="56" font-size="13" text-anchor="middle" fill="#64748b">A "GreetUser" agent action: takes a name, returns a greeting. End-to-end in 15 minutes.</text>

  <!-- User -->
  <g filter="url(#ds-qs)">
    <rect x="40" y="100" width="160" height="80" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  </g>
  <text x="120" y="130" font-size="13" font-weight="700" text-anchor="middle" fill="#7f1d1d">User</text>
  <text x="120" y="148" font-size="11" text-anchor="middle" fill="#991b1b">"Greet me, I'm Alex"</text>
  <text x="120" y="164" font-size="10" text-anchor="middle" fill="#dc2626">via test mode</text>

  <line x1="200" y1="140" x2="240" y2="140" stroke="#475569" stroke-width="2" marker-end="url(#arr-qs)"/>

  <!-- Agent -->
  <g filter="url(#ds-qs)">
    <rect x="240" y="100" width="160" height="80" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  </g>
  <text x="320" y="125" font-size="13" font-weight="700" text-anchor="middle" fill="#78350f">Agent</text>
  <text x="320" y="143" font-size="11" text-anchor="middle" fill="#92400e">Quickstart_Agent</text>
  <text x="320" y="161" font-size="10" text-anchor="middle" fill="#d97706">Picks Greet_User action</text>

  <line x1="400" y1="140" x2="440" y2="140" stroke="#475569" stroke-width="2" marker-end="url(#arr-qs)"/>

  <!-- Function -->
  <g filter="url(#ds-qs)">
    <rect x="440" y="100" width="160" height="80" rx="10" fill="#bfdbfe" stroke="#1d4ed8" stroke-width="2"/>
  </g>
  <text x="520" y="125" font-size="13" font-weight="700" text-anchor="middle" fill="#172554">GenAiFunction</text>
  <text x="520" y="143" font-size="11" text-anchor="middle" fill="#1e40af">Greet_User</text>
  <text x="520" y="161" font-size="10" text-anchor="middle" fill="#1d4ed8">target = apex</text>

  <line x1="600" y1="140" x2="640" y2="140" stroke="#475569" stroke-width="2" marker-end="url(#arr-qs)"/>

  <!-- Apex -->
  <g filter="url(#ds-qs)">
    <rect x="640" y="100" width="160" height="80" rx="10" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
  </g>
  <text x="720" y="125" font-size="13" font-weight="700" text-anchor="middle" fill="#14532d">Apex Invocable</text>
  <text x="720" y="143" font-size="11" text-anchor="middle" fill="#166534">GreetUser.cls</text>
  <text x="720" y="161" font-size="10" text-anchor="middle" fill="#15803d">"Hello Alex"</text>

  <line x1="800" y1="140" x2="840" y2="140" stroke="#475569" stroke-width="2" marker-end="url(#arr-qs)"/>

  <!-- Output -->
  <g filter="url(#ds-qs)">
    <rect x="840" y="100" width="120" height="80" rx="10" fill="#0f172a" stroke="#0f172a" stroke-width="2"/>
  </g>
  <text x="900" y="130" font-size="13" font-weight="700" text-anchor="middle" fill="#fff">Reply</text>
  <text x="900" y="150" font-size="10" text-anchor="middle" fill="#cbd5e1">"Hello, Alex!"</text>
  <text x="900" y="167" font-size="10" text-anchor="middle" fill="#cbd5e1">in chat</text>

  <!-- Files you create -->
  <text x="500" y="230" font-size="16" font-weight="700" text-anchor="middle" fill="#0f172a">The five files you create</text>

  <g font-size="11">
    <g filter="url(#ds-qs)">
      <rect x="40" y="250" width="180" height="100" rx="8" fill="#dcfce7" stroke="#15803d" stroke-width="1.5"/>
    </g>
    <text x="130" y="275" font-weight="700" text-anchor="middle" fill="#14532d">GreetUser.cls</text>
    <text x="55" y="295" fill="#334155">@InvocableMethod</text>
    <text x="55" y="312" fill="#334155">@InvocableVariable</text>
    <text x="55" y="329" fill="#334155">Input: name</text>
    <text x="55" y="346" fill="#334155">Output: greeting</text>

    <g filter="url(#ds-qs)">
      <rect x="240" y="250" width="180" height="100" rx="8" fill="#bfdbfe" stroke="#1d4ed8" stroke-width="1.5"/>
    </g>
    <text x="330" y="275" font-weight="700" text-anchor="middle" fill="#172554">Greet_User.genAiFunction-meta.xml</text>
    <text x="255" y="295" fill="#334155">Wraps the Apex class</text>
    <text x="255" y="312" fill="#334155">DeveloperName, label</text>
    <text x="255" y="329" fill="#334155">progress message</text>

    <g filter="url(#ds-qs)">
      <rect x="440" y="250" width="180" height="100" rx="8" fill="#bfdbfe" stroke="#1d4ed8" stroke-width="1.5"/>
    </g>
    <text x="530" y="275" font-weight="700" text-anchor="middle" fill="#172554">input/schema.json</text>
    <text x="455" y="295" fill="#334155">JSON Schema</text>
    <text x="455" y="312" fill="#334155">name field, required</text>
    <text x="455" y="329" fill="#334155">type lightning__textType</text>

    <g filter="url(#ds-qs)">
      <rect x="640" y="250" width="180" height="100" rx="8" fill="#bfdbfe" stroke="#1d4ed8" stroke-width="1.5"/>
    </g>
    <text x="730" y="275" font-weight="700" text-anchor="middle" fill="#172554">output/schema.json</text>
    <text x="655" y="295" fill="#334155">JSON Schema</text>
    <text x="655" y="312" fill="#334155">greeting field</text>
    <text x="655" y="329" fill="#334155">type lightning__textType</text>

    <g filter="url(#ds-qs)">
      <rect x="40" y="370" width="780" height="60" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
    </g>
    <text x="130" y="395" font-weight="700" text-anchor="middle" fill="#78350f">Quickstart_Agent.agent</text>
    <text x="60" y="412" fill="#334155">The DSL file with one subagent, one topic, links the Greet_User action, ready to deploy.</text>
  </g>

  <text x="500" y="460" font-size="11" font-style="italic" text-anchor="middle" fill="#64748b">Plus one click in the Builder to add the action and one click to activate. Then you are done.</text>
</svg>
