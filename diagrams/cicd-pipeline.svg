<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 580" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arr-cd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <filter id="ds-cd" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="1100" height="580" fill="#ffffff"/>

  <text x="550" y="34" font-size="22" font-weight="700" text-anchor="middle" fill="#0f172a">CI / CD Pipeline for Agentforce</text>
  <text x="550" y="56" font-size="13" text-anchor="middle" fill="#64748b">Automate everything you can. Activation is the manual step that intentionally stays manual.</text>

  <!-- Stage rows -->
  <text x="40" y="100" font-size="13" font-weight="700" fill="#475569">Trigger</text>
  <text x="40" y="180" font-size="13" font-weight="700" fill="#475569">Pull request</text>
  <text x="40" y="290" font-size="13" font-weight="700" fill="#475569">Merge to main</text>
  <text x="40" y="400" font-size="13" font-weight="700" fill="#475569">Release tag</text>

  <!-- PR row stages -->
  <g filter="url(#ds-cd)">
    <rect x="180" y="150" width="140" height="60" rx="8" fill="#bfdbfe" stroke="#1d4ed8" stroke-width="2"/>
  </g>
  <text x="250" y="178" font-size="12" font-weight="700" text-anchor="middle" fill="#172554">Lint + compile</text>
  <text x="250" y="196" font-size="10" text-anchor="middle" fill="#1e40af">PMD, Apex compile</text>

  <line x1="320" y1="180" x2="350" y2="180" stroke="#475569" stroke-width="1.5" marker-end="url(#arr-cd)"/>

  <g filter="url(#ds-cd)">
    <rect x="350" y="150" width="140" height="60" rx="8" fill="#bbf7d0" stroke="#15803d" stroke-width="2"/>
  </g>
  <text x="420" y="178" font-size="12" font-weight="700" text-anchor="middle" fill="#14532d">Apex tests</text>
  <text x="420" y="196" font-size="10" text-anchor="middle" fill="#166534">75%+ coverage</text>

  <line x1="490" y1="180" x2="520" y2="180" stroke="#475569" stroke-width="1.5" marker-end="url(#arr-cd)"/>

  <g filter="url(#ds-cd)">
    <rect x="520" y="150" width="140" height="60" rx="8" fill="#fde68a" stroke="#b45309" stroke-width="2"/>
  </g>
  <text x="590" y="178" font-size="12" font-weight="700" text-anchor="middle" fill="#451a03">Validate metadata</text>
  <text x="590" y="196" font-size="10" text-anchor="middle" fill="#92400e">Against scratch org</text>

  <line x1="660" y1="180" x2="690" y2="180" stroke="#475569" stroke-width="1.5" marker-end="url(#arr-cd)"/>

  <g filter="url(#ds-cd)">
    <rect x="690" y="150" width="140" height="60" rx="8" fill="#ddd6fe" stroke="#6d28d9" stroke-width="2"/>
  </g>
  <text x="760" y="178" font-size="12" font-weight="700" text-anchor="middle" fill="#3b0764">Schema validation</text>
  <text x="760" y="196" font-size="10" text-anchor="middle" fill="#5b21b6">JSON Schemas</text>

  <line x1="830" y1="180" x2="860" y2="180" stroke="#475569" stroke-width="1.5" marker-end="url(#arr-cd)"/>

  <g filter="url(#ds-cd)">
    <rect x="860" y="150" width="200" height="60" rx="8" fill="#f1f5f9" stroke="#475569" stroke-width="2" stroke-dasharray="4 3"/>
  </g>
  <text x="960" y="178" font-size="12" font-weight="700" text-anchor="middle" fill="#0f172a">Optional: deploy</text>
  <text x="960" y="196" font-size="10" text-anchor="middle" fill="#475569">to ephemeral scratch</text>

  <!-- Merge row -->
  <g filter="url(#ds-cd)">
    <rect x="180" y="260" width="180" height="60" rx="8" fill="#fed7aa" stroke="#ea580c" stroke-width="2"/>
  </g>
  <text x="270" y="288" font-size="12" font-weight="700" text-anchor="middle" fill="#7c2d12">Deploy to integration</text>
  <text x="270" y="306" font-size="10" text-anchor="middle" fill="#9a3412">Sandbox, automated</text>

  <line x1="360" y1="290" x2="390" y2="290" stroke="#475569" stroke-width="1.5" marker-end="url(#arr-cd)"/>

  <g filter="url(#ds-cd)">
    <rect x="390" y="260" width="160" height="60" rx="8" fill="#fce7f3" stroke="#be185d" stroke-width="2"/>
  </g>
  <text x="470" y="288" font-size="12" font-weight="700" text-anchor="middle" fill="#831843">Activate (manual)</text>
  <text x="470" y="306" font-size="10" text-anchor="middle" fill="#9d174d">Click in Builder</text>

  <line x1="550" y1="290" x2="580" y2="290" stroke="#475569" stroke-width="1.5" marker-end="url(#arr-cd)"/>

  <g filter="url(#ds-cd)">
    <rect x="580" y="260" width="160" height="60" rx="8" fill="#cffafe" stroke="#0e7490" stroke-width="2"/>
  </g>
  <text x="660" y="288" font-size="12" font-weight="700" text-anchor="middle" fill="#164e63">Smoke test mode</text>
  <text x="660" y="306" font-size="10" text-anchor="middle" fill="#155e75">Scripted prompts</text>

  <line x1="740" y1="290" x2="770" y2="290" stroke="#475569" stroke-width="1.5" marker-end="url(#arr-cd)"/>

  <g filter="url(#ds-cd)">
    <rect x="770" y="260" width="160" height="60" rx="8" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
  </g>
  <text x="850" y="288" font-size="12" font-weight="700" text-anchor="middle" fill="#14532d">Notify channel</text>
  <text x="850" y="306" font-size="10" text-anchor="middle" fill="#166534">Slack / Teams</text>

  <!-- Release row -->
  <g filter="url(#ds-cd)">
    <rect x="180" y="370" width="140" height="60" rx="8" fill="#fde68a" stroke="#b45309" stroke-width="2"/>
  </g>
  <text x="250" y="398" font-size="12" font-weight="700" text-anchor="middle" fill="#451a03">Deploy QA</text>
  <text x="250" y="416" font-size="10" text-anchor="middle" fill="#92400e">Auto + activate</text>

  <line x1="320" y1="400" x2="350" y2="400" stroke="#475569" stroke-width="1.5" marker-end="url(#arr-cd)"/>

  <g filter="url(#ds-cd)">
    <rect x="350" y="370" width="140" height="60" rx="8" fill="#0f172a" stroke="#0f172a" stroke-width="2"/>
  </g>
  <text x="420" y="395" font-size="12" font-weight="700" text-anchor="middle" fill="#fff">Approval gate</text>
  <text x="420" y="413" font-size="10" text-anchor="middle" fill="#cbd5e1">Human review</text>

  <line x1="490" y1="400" x2="520" y2="400" stroke="#475569" stroke-width="1.5" marker-end="url(#arr-cd)"/>

  <g filter="url(#ds-cd)">
    <rect x="520" y="370" width="140" height="60" rx="8" fill="#fed7aa" stroke="#ea580c" stroke-width="2"/>
  </g>
  <text x="590" y="395" font-size="12" font-weight="700" text-anchor="middle" fill="#7c2d12">Deploy UAT</text>
  <text x="590" y="413" font-size="10" text-anchor="middle" fill="#9a3412">Auto + activate</text>

  <line x1="660" y1="400" x2="690" y2="400" stroke="#475569" stroke-width="1.5" marker-end="url(#arr-cd)"/>

  <g filter="url(#ds-cd)">
    <rect x="690" y="370" width="140" height="60" rx="8" fill="#0f172a" stroke="#0f172a" stroke-width="2"/>
  </g>
  <text x="760" y="395" font-size="12" font-weight="700" text-anchor="middle" fill="#fff">Approval gate</text>
  <text x="760" y="413" font-size="10" text-anchor="middle" fill="#cbd5e1">Final sign-off</text>

  <line x1="830" y1="400" x2="860" y2="400" stroke="#475569" stroke-width="1.5" marker-end="url(#arr-cd)"/>

  <g filter="url(#ds-cd)">
    <rect x="860" y="370" width="200" height="60" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  </g>
  <text x="960" y="395" font-size="12" font-weight="700" text-anchor="middle" fill="#7f1d1d">Production</text>
  <text x="960" y="413" font-size="10" text-anchor="middle" fill="#991b1b">Deploy + manual activate</text>

  <!-- Bottom legend -->
  <g filter="url(#ds-cd)">
    <rect x="40" y="470" width="1020" height="90" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  </g>
  <text x="60" y="494" font-size="13" font-weight="700" fill="#0f172a">What CI cannot do</text>
  <text x="60" y="514" font-size="11" fill="#334155">Activate an agent. Activation is intentionally manual to keep release decisions in human hands.</text>
  <text x="60" y="530" font-size="11" fill="#334155">Verify the LLM picks the right action under all phrasings. That requires conversation eval, not unit tests.</text>
  <text x="60" y="546" font-size="11" fill="#334155">Replicate the runtime registry's resolution exactly. Validation runs in SOAP context, runtime in agent context. Test mode is the truth.</text>
</svg>
