<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 760" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <filter id="soft-shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="900" height="760" fill="#ffffff"/>

  <text x="450" y="36" font-size="22" font-weight="700" text-anchor="middle" fill="#0f172a">Custom Apex Agent Action: The Five Layers</text>
  <text x="450" y="58" font-size="13" text-anchor="middle" fill="#64748b">Each layer must be present and wired together. Missing any one produces the same generic "Action name not found" error.</text>

  <!-- Layer 5 -->
  <g filter="url(#soft-shadow)">
    <rect x="80" y="90" width="740" height="105" rx="10" fill="#fce7f3" stroke="#be185d" stroke-width="2"/>
  </g>
  <circle cx="120" cy="142" r="26" fill="#be185d"/>
  <text x="120" y="150" font-size="22" font-weight="700" text-anchor="middle" fill="#fff">5</text>
  <text x="170" y="125" font-size="17" font-weight="700" fill="#831843">Activation (runtime version)</text>
  <text x="170" y="148" font-size="13" fill="#9d174d">The activated AiAuthoringBundle version, materialised into the runtime registry.</text>
  <text x="170" y="167" font-size="13" fill="#9d174d">Authoring state is not runtime state.</text>
  <text x="170" y="184" font-size="11" font-style="italic" fill="#be185d">Owner: anyone with publish rights, manual per environment</text>

  <line x1="450" y1="195" x2="450" y2="218" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Layer 4 -->
  <g filter="url(#soft-shadow)">
    <rect x="80" y="220" width="740" height="105" rx="10" fill="#ddd6fe" stroke="#6d28d9" stroke-width="2"/>
  </g>
  <circle cx="120" cy="272" r="26" fill="#6d28d9"/>
  <text x="120" y="280" font-size="22" font-weight="700" text-anchor="middle" fill="#fff">4</text>
  <text x="170" y="255" font-size="17" font-weight="700" fill="#3b0764">Topic and subagent linkage</text>
  <text x="170" y="278" font-size="13" fill="#5b21b6">Adds the GenAiFunction to the agent's reasoning surface.</text>
  <text x="170" y="297" font-size="13" fill="#5b21b6">Without this, the LLM planner does not know the action exists.</text>
  <text x="170" y="314" font-size="11" font-style="italic" fill="#6d28d9">Owner: conversation designer (Builder UI or .agent DSL)</text>

  <line x1="450" y1="325" x2="450" y2="348" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Layer 3 -->
  <g filter="url(#soft-shadow)">
    <rect x="80" y="350" width="740" height="105" rx="10" fill="#bfdbfe" stroke="#1d4ed8" stroke-width="2"/>
  </g>
  <circle cx="120" cy="402" r="26" fill="#1d4ed8"/>
  <text x="120" y="410" font-size="22" font-weight="700" text-anchor="middle" fill="#fff">3</text>
  <text x="170" y="385" font-size="17" font-weight="700" fill="#172554">GenAiFunction wrapper</text>
  <text x="170" y="408" font-size="13" fill="#1e40af">DeveloperName, InvocationTargetType, InvocationTarget, input/output schemas.</text>
  <text x="170" y="427" font-size="13" fill="#1e40af">Registers a piece of platform logic as a callable agent action.</text>
  <text x="170" y="444" font-size="11" font-style="italic" fill="#1d4ed8">Owner: developer or admin (Setup &gt; Agent Actions)</text>

  <line x1="450" y1="455" x2="450" y2="478" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Layer 2 -->
  <g filter="url(#soft-shadow)">
    <rect x="80" y="480" width="740" height="105" rx="10" fill="#bbf7d0" stroke="#15803d" stroke-width="2"/>
  </g>
  <circle cx="120" cy="532" r="26" fill="#15803d"/>
  <text x="120" y="540" font-size="22" font-weight="700" text-anchor="middle" fill="#fff">2</text>
  <text x="170" y="515" font-size="17" font-weight="700" fill="#14532d">Implementation</text>
  <text x="170" y="538" font-size="13" fill="#166534">Apex @InvocableMethod, auto-launched flow, or prompt template.</text>
  <text x="170" y="557" font-size="13" fill="#166534">The actual logic that runs when the agent invokes the action.</text>
  <text x="170" y="574" font-size="11" font-style="italic" fill="#15803d">Owner: developer</text>

  <line x1="450" y1="585" x2="450" y2="608" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Layer 1 -->
  <g filter="url(#soft-shadow)">
    <rect x="80" y="610" width="740" height="105" rx="10" fill="#fde68a" stroke="#b45309" stroke-width="2"/>
  </g>
  <circle cx="120" cy="662" r="26" fill="#b45309"/>
  <text x="120" y="670" font-size="22" font-weight="700" text-anchor="middle" fill="#fff">1</text>
  <text x="170" y="645" font-size="17" font-weight="700" fill="#451a03">Permissions for the agent user</text>
  <text x="170" y="668" font-size="13" fill="#92400e">Permission set or profile access. The agent runs as a configured user, not as you.</text>
  <text x="170" y="687" font-size="13" fill="#92400e">That user needs class access plus FLS/CRUD on touched objects.</text>
  <text x="170" y="704" font-size="11" font-style="italic" fill="#b45309">Owner: Salesforce admin or DevOps</text>

  <text x="450" y="745" font-size="11" font-style="italic" text-anchor="middle" fill="#64748b">Resolution direction: top-down at execution time.  Each downward arrow reads "resolves to".</text>
</svg>
