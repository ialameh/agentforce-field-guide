<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <filter id="ds-dm" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="1000" height="600" fill="#ffffff"/>

  <text x="500" y="34" font-size="22" font-weight="700" text-anchor="middle" fill="#0f172a">Choosing an Action Type</text>
  <text x="500" y="56" font-size="13" text-anchor="middle" fill="#64748b">Pick the type whose strengths match your problem. Mixing types in one agent is normal.</text>

  <!-- Column headers -->
  <g font-size="13" font-weight="700" text-anchor="middle">
    <rect x="40" y="90" width="180" height="40" rx="6" fill="#0f172a"/>
    <text x="130" y="115" fill="#ffffff">Criterion</text>
    <rect x="225" y="90" width="180" height="40" rx="6" fill="#15803d"/>
    <text x="315" y="115" fill="#ffffff">Apex Invocable</text>
    <rect x="410" y="90" width="180" height="40" rx="6" fill="#1d4ed8"/>
    <text x="500" y="115" fill="#ffffff">Flow</text>
    <rect x="595" y="90" width="180" height="40" rx="6" fill="#be185d"/>
    <text x="685" y="115" fill="#ffffff">Prompt Template</text>
    <rect x="780" y="90" width="180" height="40" rx="6" fill="#b45309"/>
    <text x="870" y="115" fill="#ffffff">External Service</text>
  </g>

  <!-- Rows -->
  <g font-size="12">
    <!-- Row 1 -->
    <rect x="40" y="135" width="180" height="36" fill="#f1f5f9"/>
    <text x="55" y="158" font-weight="600" fill="#0f172a">Best for</text>
    <text x="315" y="158" text-anchor="middle" fill="#166534">Transactional logic</text>
    <text x="500" y="158" text-anchor="middle" fill="#1e40af">Declarative orchestration</text>
    <text x="685" y="158" text-anchor="middle" fill="#9d174d">LLM-generated text</text>
    <text x="870" y="158" text-anchor="middle" fill="#92400e">Cross-system callouts</text>

    <!-- Row 2 -->
    <rect x="40" y="173" width="180" height="36" fill="#ffffff"/>
    <text x="55" y="196" font-weight="600" fill="#0f172a">Latency</text>
    <text x="315" y="196" text-anchor="middle" fill="#166534">Low (sub-second)</text>
    <text x="500" y="196" text-anchor="middle" fill="#1e40af">Medium</text>
    <text x="685" y="196" text-anchor="middle" fill="#9d174d">High (LLM call)</text>
    <text x="870" y="196" text-anchor="middle" fill="#92400e">Depends on remote</text>

    <!-- Row 3 -->
    <rect x="40" y="211" width="180" height="36" fill="#f1f5f9"/>
    <text x="55" y="234" font-weight="600" fill="#0f172a">Complex logic</text>
    <text x="315" y="234" text-anchor="middle" fill="#166534">★★★★★</text>
    <text x="500" y="234" text-anchor="middle" fill="#1e40af">★★★☆☆</text>
    <text x="685" y="234" text-anchor="middle" fill="#9d174d">★☆☆☆☆</text>
    <text x="870" y="234" text-anchor="middle" fill="#92400e">★★★★☆</text>

    <!-- Row 4 -->
    <rect x="40" y="249" width="180" height="36" fill="#ffffff"/>
    <text x="55" y="272" font-weight="600" fill="#0f172a">Test coverage</text>
    <text x="315" y="272" text-anchor="middle" fill="#166534">Standard 75%+ Apex</text>
    <text x="500" y="272" text-anchor="middle" fill="#1e40af">Flow tests, limited</text>
    <text x="685" y="272" text-anchor="middle" fill="#9d174d">Manual eval</text>
    <text x="870" y="272" text-anchor="middle" fill="#92400e">Mock the remote</text>

    <!-- Row 5 -->
    <rect x="40" y="287" width="180" height="36" fill="#f1f5f9"/>
    <text x="55" y="310" font-weight="600" fill="#0f172a">Determinism</text>
    <text x="315" y="310" text-anchor="middle" fill="#166534">Fully deterministic</text>
    <text x="500" y="310" text-anchor="middle" fill="#1e40af">Fully deterministic</text>
    <text x="685" y="310" text-anchor="middle" fill="#9d174d">Non-deterministic</text>
    <text x="870" y="310" text-anchor="middle" fill="#92400e">Depends on remote</text>

    <!-- Row 6 -->
    <rect x="40" y="325" width="180" height="36" fill="#ffffff"/>
    <text x="55" y="348" font-weight="600" fill="#0f172a">Maintenance owner</text>
    <text x="315" y="348" text-anchor="middle" fill="#166534">Developer</text>
    <text x="500" y="348" text-anchor="middle" fill="#1e40af">Admin or dev</text>
    <text x="685" y="348" text-anchor="middle" fill="#9d174d">Prompt engineer</text>
    <text x="870" y="348" text-anchor="middle" fill="#92400e">Integration team</text>

    <!-- Row 7 -->
    <rect x="40" y="363" width="180" height="36" fill="#f1f5f9"/>
    <text x="55" y="386" font-weight="600" fill="#0f172a">Side effects on Salesforce data</text>
    <text x="315" y="386" text-anchor="middle" fill="#166534">★★★★★</text>
    <text x="500" y="386" text-anchor="middle" fill="#1e40af">★★★★★</text>
    <text x="685" y="386" text-anchor="middle" fill="#9d174d">★☆☆☆☆</text>
    <text x="870" y="386" text-anchor="middle" fill="#92400e">★★☆☆☆</text>

    <!-- Row 8 -->
    <rect x="40" y="401" width="180" height="36" fill="#ffffff"/>
    <text x="55" y="424" font-weight="600" fill="#0f172a">Callout outside Salesforce</text>
    <text x="315" y="424" text-anchor="middle" fill="#166534">Yes (callout=true)</text>
    <text x="500" y="424" text-anchor="middle" fill="#1e40af">Yes (HTTP action)</text>
    <text x="685" y="424" text-anchor="middle" fill="#9d174d">No</text>
    <text x="870" y="424" text-anchor="middle" fill="#92400e">Native</text>
  </g>

  <!-- Picker hints -->
  <g filter="url(#ds-dm)">
    <rect x="40" y="470" width="920" height="100" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  </g>
  <text x="60" y="495" font-size="13" font-weight="700" fill="#0f172a">Quick picker</text>
  <text x="60" y="518" font-size="12" fill="#334155"><tspan font-weight="600">Apex</tspan>: validations, money, regulated calculations, anything that must be exactly correct.</text>
  <text x="60" y="538" font-size="12" fill="#334155"><tspan font-weight="600">Flow</tspan>: multi-step record updates, approvals, decisions admins can change without a deploy.</text>
  <text x="60" y="558" font-size="12" fill="#334155"><tspan font-weight="600">Prompt</tspan>: drafting copy, summarising, classifying. Let the LLM write, but never let it decide outcomes alone.</text>
  <text x="60" y="578" font-size="12" fill="#334155"><tspan font-weight="600">External</tspan>: SAP, payment gateway, anything that lives outside Salesforce.</text>
</svg>
