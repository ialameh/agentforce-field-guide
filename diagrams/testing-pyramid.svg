<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <filter id="ds-tp" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="900" height="620" fill="#ffffff"/>

  <text x="450" y="34" font-size="22" font-weight="700" text-anchor="middle" fill="#0f172a">The Agentforce Testing Pyramid</text>
  <text x="450" y="56" font-size="13" text-anchor="middle" fill="#64748b">Cheap and many at the base. Slow and few at the top. Each layer protects something the layers below cannot.</text>

  <!-- Pyramid: 4 trapezoidal slices -->
  <!-- Top: Conversation eval -->
  <g filter="url(#ds-tp)">
    <polygon points="350,90 550,90 510,170 390,170" fill="#fce7f3" stroke="#be185d" stroke-width="2"/>
  </g>
  <text x="450" y="130" font-size="14" font-weight="700" text-anchor="middle" fill="#831843">Conversation eval</text>
  <text x="450" y="150" font-size="11" text-anchor="middle" fill="#9d174d">Golden conversations, LLM judge</text>

  <!-- Layer 3: Agent integration -->
  <g filter="url(#ds-tp)">
    <polygon points="290,170 610,170 570,250 330,250" fill="#ddd6fe" stroke="#6d28d9" stroke-width="2"/>
  </g>
  <text x="450" y="210" font-size="14" font-weight="700" text-anchor="middle" fill="#3b0764">Agent integration tests</text>
  <text x="450" y="230" font-size="11" text-anchor="middle" fill="#5b21b6">Test mode, real activated agent, scripted prompts</text>

  <!-- Layer 2: Action contract -->
  <g filter="url(#ds-tp)">
    <polygon points="230,250 670,250 630,330 270,330" fill="#bfdbfe" stroke="#1d4ed8" stroke-width="2"/>
  </g>
  <text x="450" y="290" font-size="14" font-weight="700" text-anchor="middle" fill="#172554">Action contract tests</text>
  <text x="450" y="310" font-size="11" text-anchor="middle" fill="#1e40af">Direct REST invoke of /actions/custom/apex/&lt;name&gt;</text>

  <!-- Layer 1: Apex unit -->
  <g filter="url(#ds-tp)">
    <polygon points="170,330 730,330 690,410 210,410" fill="#bbf7d0" stroke="#15803d" stroke-width="2"/>
  </g>
  <text x="450" y="370" font-size="14" font-weight="700" text-anchor="middle" fill="#14532d">Apex unit tests</text>
  <text x="450" y="390" font-size="11" text-anchor="middle" fill="#166534">Standard @IsTest classes, mock callouts, 75% coverage</text>

  <!-- Speed/cost annotation arrow -->
  <line x1="60" y1="100" x2="60" y2="410" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="56,100 64,100 60,90" fill="#94a3b8"/>
  <polygon points="56,410 64,410 60,420" fill="#94a3b8"/>
  <text x="46" y="120" font-size="11" font-weight="600" text-anchor="end" fill="#475569">Slow</text>
  <text x="46" y="135" font-size="10" text-anchor="end" fill="#64748b">Few</text>
  <text x="46" y="150" font-size="10" text-anchor="end" fill="#64748b">Expensive</text>
  <text x="46" y="395" font-size="11" font-weight="600" text-anchor="end" fill="#475569">Fast</text>
  <text x="46" y="380" font-size="10" text-anchor="end" fill="#64748b">Many</text>
  <text x="46" y="365" font-size="10" text-anchor="end" fill="#64748b">Cheap</text>

  <!-- Right side annotation arrow -->
  <line x1="840" y1="410" x2="840" y2="100" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="836,100 844,100 840,90" fill="#94a3b8"/>
  <text x="850" y="120" font-size="11" font-weight="600" fill="#475569">User-visible</text>
  <text x="850" y="395" font-size="11" font-weight="600" fill="#475569">Internal</text>
  <text x="850" y="250" font-size="11" fill="#64748b">Confidence</text>
  <text x="850" y="265" font-size="11" fill="#64748b">in real</text>
  <text x="850" y="280" font-size="11" fill="#64748b">behaviour</text>

  <!-- Coverage table below -->
  <g filter="url(#ds-tp)">
    <rect x="60" y="450" width="780" height="150" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  </g>
  <text x="80" y="475" font-size="13" font-weight="700" fill="#0f172a">What each layer protects against</text>

  <text x="80" y="500" font-size="12" fill="#334155"><tspan font-weight="700" fill="#15803d">Apex unit:</tspan> compile errors, business logic bugs, governor limits, exception handling.</text>
  <text x="80" y="520" font-size="12" fill="#334155"><tspan font-weight="700" fill="#1d4ed8">Action contract:</tspan> invocable annotations correct, schema matches Apex, REST registration works.</text>
  <text x="80" y="540" font-size="12" fill="#334155"><tspan font-weight="700" fill="#6d28d9">Agent integration:</tspan> linkage to topic, activation, agent user permissions, end-to-end variable mapping.</text>
  <text x="80" y="560" font-size="12" fill="#334155"><tspan font-weight="700" fill="#be185d">Conversation eval:</tspan> LLM picks the right action, copy is on-brand, edge cases handled gracefully.</text>
  <text x="80" y="585" font-size="11" font-style="italic" fill="#64748b">A regression at any layer means the layers above it cannot reliably test what they are meant to test.</text>
</svg>
