<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 720" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow-tt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <filter id="soft-shadow-tt" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="980" height="720" fill="#ffffff"/>

  <text x="490" y="34" font-size="22" font-weight="700" text-anchor="middle" fill="#0f172a">Triage Decision Tree</text>
  <text x="490" y="56" font-size="13" text-anchor="middle" fill="#64748b">"Action name not found" or any related Agentforce custom-action failure. Walk top to bottom.</text>

  <!-- Start -->
  <g filter="url(#soft-shadow-tt)">
    <rect x="380" y="80" width="220" height="48" rx="24" fill="#0f172a" stroke="#0f172a" stroke-width="2"/>
  </g>
  <text x="490" y="110" font-size="14" font-weight="700" text-anchor="middle" fill="#fff">Action fails at runtime</text>

  <line x1="490" y1="128" x2="490" y2="148" stroke="#475569" stroke-width="2" marker-end="url(#arrow-tt)"/>

  <!-- Decision 1: ApexClass exists -->
  <g filter="url(#soft-shadow-tt)">
    <polygon points="490,150 700,200 490,250 280,200" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  </g>
  <text x="490" y="195" font-size="14" font-weight="700" text-anchor="middle" fill="#78350f">ApexClass exists</text>
  <text x="490" y="213" font-size="14" font-weight="700" text-anchor="middle" fill="#78350f">in the org?</text>

  <!-- No path 1 -->
  <line x1="280" y1="200" x2="170" y2="200" stroke="#475569" stroke-width="2" marker-end="url(#arrow-tt)"/>
  <text x="225" y="190" font-size="12" font-weight="700" text-anchor="middle" fill="#dc2626">No</text>
  <g filter="url(#soft-shadow-tt)">
    <rect x="40" y="180" width="130" height="40" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  </g>
  <text x="105" y="205" font-size="12" font-weight="600" text-anchor="middle" fill="#7f1d1d">Deploy class</text>

  <!-- Yes path 1 -->
  <line x1="490" y1="250" x2="490" y2="270" stroke="#475569" stroke-width="2" marker-end="url(#arrow-tt)"/>
  <text x="505" y="265" font-size="12" font-weight="700" fill="#166534">Yes</text>

  <!-- Decision 2: REST invoke -->
  <g filter="url(#soft-shadow-tt)">
    <polygon points="490,272 700,322 490,372 280,322" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  </g>
  <text x="490" y="312" font-size="14" font-weight="700" text-anchor="middle" fill="#78350f">REST invoke works?</text>
  <text x="490" y="330" font-size="11" text-anchor="middle" fill="#92400e">/services/data/.../actions/custom/apex</text>
  <text x="490" y="346" font-size="11" text-anchor="middle" fill="#92400e">returns isSuccess: true</text>

  <line x1="280" y1="322" x2="170" y2="322" stroke="#475569" stroke-width="2" marker-end="url(#arrow-tt)"/>
  <text x="225" y="312" font-size="12" font-weight="700" text-anchor="middle" fill="#dc2626">No</text>
  <g filter="url(#soft-shadow-tt)">
    <rect x="40" y="302" width="130" height="40" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  </g>
  <text x="105" y="327" font-size="12" font-weight="600" text-anchor="middle" fill="#7f1d1d">Fix Apex / perms</text>

  <line x1="490" y1="372" x2="490" y2="392" stroke="#475569" stroke-width="2" marker-end="url(#arrow-tt)"/>
  <text x="505" y="387" font-size="12" font-weight="700" fill="#166534">Yes</text>

  <!-- Decision 3: GenAiFunction -->
  <g filter="url(#soft-shadow-tt)">
    <polygon points="490,394 700,444 490,494 280,444" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  </g>
  <text x="490" y="438" font-size="14" font-weight="700" text-anchor="middle" fill="#78350f">GenAiFunction</text>
  <text x="490" y="456" font-size="14" font-weight="700" text-anchor="middle" fill="#78350f">exists?</text>

  <line x1="280" y1="444" x2="170" y2="444" stroke="#475569" stroke-width="2" marker-end="url(#arrow-tt)"/>
  <text x="225" y="434" font-size="12" font-weight="700" text-anchor="middle" fill="#dc2626">No</text>
  <g filter="url(#soft-shadow-tt)">
    <rect x="20" y="424" width="170" height="40" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  </g>
  <text x="105" y="449" font-size="12" font-weight="600" text-anchor="middle" fill="#7f1d1d">Setup &gt; Agent Actions &gt; New</text>

  <line x1="490" y1="494" x2="490" y2="514" stroke="#475569" stroke-width="2" marker-end="url(#arrow-tt)"/>
  <text x="505" y="509" font-size="12" font-weight="700" fill="#166534">Yes</text>

  <!-- Decision 4: linked to topic -->
  <g filter="url(#soft-shadow-tt)">
    <polygon points="490,516 700,566 490,616 280,566" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  </g>
  <text x="490" y="560" font-size="14" font-weight="700" text-anchor="middle" fill="#78350f">Linked to topic?</text>
  <text x="490" y="578" font-size="11" text-anchor="middle" fill="#92400e">Action visible under</text>
  <text x="490" y="594" font-size="11" text-anchor="middle" fill="#92400e">"Actions Available For Reasoning"</text>

  <line x1="280" y1="566" x2="170" y2="566" stroke="#475569" stroke-width="2" marker-end="url(#arrow-tt)"/>
  <text x="225" y="556" font-size="12" font-weight="700" text-anchor="middle" fill="#dc2626">No</text>
  <g filter="url(#soft-shadow-tt)">
    <rect x="20" y="546" width="170" height="40" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  </g>
  <text x="105" y="571" font-size="12" font-weight="600" text-anchor="middle" fill="#7f1d1d">Add Action in Builder</text>

  <line x1="700" y1="566" x2="780" y2="566" stroke="#475569" stroke-width="2" marker-end="url(#arrow-tt)"/>
  <text x="740" y="556" font-size="12" font-weight="700" text-anchor="middle" fill="#166534">Yes</text>

  <!-- Decision 5: Activated -->
  <g filter="url(#soft-shadow-tt)">
    <polygon points="870,566 940,606 870,646 800,606" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  </g>
  <text x="870" y="600" font-size="13" font-weight="700" text-anchor="middle" fill="#78350f">Agent</text>
  <text x="870" y="616" font-size="13" font-weight="700" text-anchor="middle" fill="#78350f">activated?</text>

  <line x1="800" y1="606" x2="720" y2="640" stroke="#475569" stroke-width="2" marker-end="url(#arrow-tt)"/>
  <text x="745" y="630" font-size="12" font-weight="700" text-anchor="middle" fill="#dc2626">No</text>
  <g filter="url(#soft-shadow-tt)">
    <rect x="540" y="640" width="180" height="40" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  </g>
  <text x="630" y="665" font-size="12" font-weight="600" text-anchor="middle" fill="#7f1d1d">Click Activate / Publish</text>

  <line x1="870" y1="646" x2="870" y2="680" stroke="#475569" stroke-width="2" marker-end="url(#arrow-tt)"/>
  <text x="888" y="673" font-size="12" font-weight="700" fill="#166534">Yes</text>

  <g filter="url(#soft-shadow-tt)">
    <rect x="800" y="680" width="140" height="34" rx="17" fill="#16a34a" stroke="#166534" stroke-width="2"/>
  </g>
  <text x="870" y="703" font-size="13" font-weight="700" text-anchor="middle" fill="#fff">Test passes</text>

  <!-- Curved feedback paths to indicate "fix and retry" -->
  <path d="M 105 220 Q 60 360 60 500 Q 60 600 90 600" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrow-tt)"/>

  <text x="40" y="704" font-size="10" font-style="italic" fill="#94a3b8">After any fix, return to top.</text>
</svg>
